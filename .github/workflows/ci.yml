name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test -- --run
        env:
          VITE_ALGOLIA_APP_ID: test
          VITE_ALGOLIA_SEARCH_API_KEY: test
          VITE_ALGOLIA_AGENT_ID: test
